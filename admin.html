<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaMo Aarogya - Advanced Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --secondary: #34b7f1;
            --accent: #ffb703;
            --bg: #f8fafc;
            --surface: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(142, 70%, 94%, 1) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(200, 80%, 94%, 1) 0, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        /* Glassmorphism Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
        }

        header .brand span {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }

        /* Main Container */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--surface);
            backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .stat-card .info h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-card .info .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-card .icon-box {
            background: rgba(37, 211, 102, 0.1);
            color: var(--primary);
            padding: 12px;
            border-radius: 16px;
        }

        /* Broadcast Card */
        .broadcast-card {
            background: #1e293b;
            color: white;
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.2);
            position: relative;
            overflow: hidden;
        }

        .broadcast-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.2) 0%, transparent 70%);
            pointer-events: none;
        }

        .broadcast-card h3 {
            font-size: 1.25rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .broadcast-card textarea {
            width: 100%;
            height: 100px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }

        .broadcast-card textarea:focus {
            border-color: var(--primary);
        }

        /* User Accordion */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .user-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
        }

        .user-header {
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: white;
            user-select: none;
        }

        .user-header:hover {
            background: #fafafa;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .user-meta h5 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .user-meta p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .user-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chevron {
            transition: transform 0.3s ease;
        }

        /* Accordion Open State */
        .user-section.active {
            border-color: var(--primary);
            box-shadow: 0 12px 30px -10px rgba(37, 211, 102, 0.1);
        }

        .user-section.active .chevron {
            transform: rotate(180deg);
        }

        .chat-history {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #fdfdfd;
        }

        .user-section.active .chat-history {
            max-height: 2000px; /* Large enough to fit history */
            border-top: 1px solid var(--border);
        }

        .chat-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Message Bubbles */
        .msg-entry {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            max-width: 90%;
            position: relative;
        }

        .bubble-user {
            background: #f1f5f9;
            color: #1e293b;
            align-self: flex-start;
            border-top-left-radius: 4px;
        }

        .bubble-ai {
            background: #dcf8c6;
            color: #064e3b;
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 10px -2px rgba(37, 211, 102, 0.1);
        }

        .media-preview {
            margin-bottom: 12px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            max-width: 350px;
            transition: transform 0.3s ease;
        }

        .media-preview:hover {
            transform: scale(1.02);
        }

        .media-preview img {
            width: 100%;
            display: block;
            object-fit: cover;
            max-height: 300px;
        }

        .pdf-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: #fff;
            color: #dc2626;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }

        /* Toast Notifications */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: white;
            color: var(--text-main);
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            animation: slideIn 0.3s ease forwards;
            border-left: 6px solid var(--primary);
            min-width: 300px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.success { border-color: var(--primary); }
        .toast.error { border-color: #ef4444; }
        .toast.info { border-color: var(--secondary); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        @media (max-width: 600px) {
            header { padding: 1rem 20px; }
            .stats-grid { grid-template-columns: 1fr; }
            .bubble { max-width: 100%; }
            .media-preview { max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L15 8L21 9L17 14L18 20L12 17L6 20L7 14L3 9L9 8L12 2Z" fill="#25D366" stroke="#25D366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>NaMo Aarogya <b>Control</b></span>
        </div>
        <button class="btn btn-primary" onclick="fetchLogs()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.24"></path><path d="M21 3v9h-9"></path></svg>
            Refresh
        </button>
    </header>

    <div class="container">
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="info">
                    <h4>Total Active Users</h4>
                    <div class="value" id="userCount">0</div>
                </div>
                <div class="icon-box">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="info">
                    <h4>Total Queries</h4>
                    <div class="value" id="totalQueries">0</div>
                </div>
                <div class="icon-box" style="background: rgba(52, 183, 241, 0.1); color: var(--secondary);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                </div>
            </div>
            <div class="stat-card">
                <div class="info">
                    <h4>Last Log Sync</h4>
                    <div class="value" style="font-size: 1.25rem; line-height: 2.2;" id="lastSyncTime">-</div>
                </div>
                <div class="icon-box" style="background: rgba(255, 183, 3, 0.1); color: var(--accent);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
            </div>
        </div>

        <div class="broadcast-card">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.3 21l1.7-1 1.7 1M2 13V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2-2v10a2 2 0 0 1-2 2h-5l-4 4-1-4H4a2 2 0 0 1-2-2z"></path></svg>
                Global Admin Broadcast
            </h3>
            <textarea id="broadcastMsg" placeholder="Apna sandesh (announcement) yahan type karein..."></textarea>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <p style="font-size: 0.8rem; opacity: 0.7;">Sent to ALL unique users in history database.</p>
                <button class="btn btn-primary" id="broadcastBtn" onclick="sendBroadcast()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    Fly Broadcast
                </button>
            </div>
        </div>

        <h3 style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            Patient Logs by Conversation
        </h3>

        <div id="logsContainer" class="user-list">
            <div style="text-align: center; padding: 50px; color: var(--text-muted);">
                🔄 Fetching patient interactions...
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        /**
         * Toast Notification System
         */
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if(type === 'success') icon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
            else if(type === 'error') icon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';
            
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        /**
         * Date Formatter (e.g., 12 Dec, 03:56 AM)
         */
        function formatDate(isoString) {
            const date = new Date(isoString);
            const options = { day: '2-digit', month: 'short' };
            const dayMonth = date.toLocaleDateString('en-GB', options);
            const time = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
            return `${dayMonth}, ${time}`;
        }

        /**
         * WhatsApp formatting parser
         */
        function parseFormatting(text) {
            if (!text) return "";
            return text
                .replace(/\*([^\*]+)\*/g, '<b>$1</b>')
                .replace(/_([^_]+)_/g, '<i>$1</i>')
                .replace(/^• (.*)$/gm, '<li>$1</li>');
        }

        /**
         * Group and Render Logs
         */
        async function fetchLogs() {
            const container = document.getElementById('logsContainer');
            try {
                const response = await fetch('/api/history');
                const logs = await response.json();

                // Group by user JID
                const grouped = logs.reduce((acc, log) => {
                    const userId = log.user;
                    if (!acc[userId]) acc[userId] = [];
                    acc[userId].push(log);
                    return acc;
                }, {});

                const sortedUsers = Object.keys(grouped).sort((a, b) => {
                    // Sort by the timestamp of the latest message in each group
                    return new Date(grouped[b][0].timestamp) - new Date(grouped[a][0].timestamp);
                });

                document.getElementById('totalQueries').innerText = logs.length;
                document.getElementById('userCount').innerText = sortedUsers.length;
                document.getElementById('lastSyncTime').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (sortedUsers.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:40px;">Abhi tak koi chat history upalabdh nahi hai. 😊</div>`;
                    return;
                }

                container.innerHTML = sortedUsers.map(jid => {
                    const userHistory = grouped[jid];
                    const initials = jid.split('@')[0].slice(-2);
                    const lastActive = formatDate(userHistory[0].timestamp);
                    const isGroup = jid.endsWith('@g.us');
                    const userName = isGroup ? `Group: ${jid.split('@')[0].slice(0, 10)}...` : `+${jid.split('@')[0]}`;

                    return `
                        <div class="user-section" id="section-${jid.replace(/[^a-zA-Z0-9]/g, '')}">
                            <div class="user-header" onclick="toggleAccordion('${jid.replace(/[^a-zA-Z0-9]/g, '')}')">
                                <div class="user-info">
                                    <div class="avatar">${initials}</div>
                                    <div class="user-meta">
                                        <h5>${userName}</h5>
                                        <p>Last active: ${lastActive} • ${userHistory.length} messages</p>
                                    </div>
                                </div>
                                <div class="user-actions">
                                    <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"></path></svg>
                                </div>
                            </div>
                            <div class="chat-history">
                                <div class="chat-content">
                                    ${userHistory.map(entry => `
                                        <div class="msg-entry">
                                            <div class="msg-header">
                                                <span>Patient Query</span>
                                                <span style="opacity: 0.7;">${formatDate(entry.timestamp)}</span>
                                            </div>
                                            <div class="bubble bubble-user">
                                                ${entry.mediaUrl ? `
                                                    <div class="media-preview">
                                                        ${entry.mediaUrl.endsWith('.pdf') ? 
                                                            `<a href="${entry.mediaUrl}" target="_blank" class="pdf-badge">
                                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                                                Medical Report PDF
                                                            </a>` : 
                                                            `<a href="${entry.mediaUrl}" target="_blank"><img src="${entry.mediaUrl}" /></a>`
                                                        }
                                                    </div>` : ''}
                                                ${entry.query || '<i>[No Text]</i>'}
                                            </div>

                                            <div class="msg-header" style="justify-content: flex-end; margin-top: 10px;">
                                                <span>Bot Observation</span>
                                            </div>
                                            <div class="bubble bubble-ai">
                                                ${parseFormatting(entry.response)}
                                            </div>
                                        </div>
                                    `).join('<hr style="border:0; border-top:1px dashed #e2e8f0; margin: 10px 0;">')}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error("Fetch error:", err);
                showToast("Failed to fetch logs from server.", "error");
            }
        }

        /**
         * Accordion Toggle Logic (One open at a time)
         */
        function toggleAccordion(id) {
            const sections = document.querySelectorAll('.user-section');
            const target = document.getElementById(`section-${id}`);
            
            const wasActive = target.classList.contains('active');
            
            // Close all
            sections.forEach(s => s.classList.remove('active'));
            
            // Toggle target
            if (!wasActive) target.classList.add('active');
        }

        /**
         * Custom Modal for Confirmation
         */
        function showConfirm(message, callback) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
                display: flex; align-items: center; justify-content: center; z-index: 10001;
                animation: fadeIn 0.3s ease;
            `;
            
            const content = document.createElement('div');
            content.style.cssText = `
                background: white; padding: 35px; border-radius: 28px; width: 90%; max-width: 400px;
                box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); text-align: center;
                border: 1px solid rgba(255,255,255,0.2); animation: scaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            `;
            
            content.innerHTML = `
                <div style="background: rgba(37, 211, 102, 0.1); color: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.3 21l1.7-1 1.7 1M2 13V6a2 2 0 0 1 2-2h14a2 2 0 0 1 2-2v10a2 2 0 0 1-2 2h-5l-4 4-1-4H4a2 2 0 0 1-2-2z"></path></svg>
                </div>
                <h3 style="margin-bottom: 12px; font-size: 1.4rem;">Confirm Broadcast?</h3>
                <p style="color: #64748b; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5;">${message}</p>
                <div style="display: flex; gap: 12px;">
                    <button id="cancelBtn" class="btn" style="flex: 1; background: #f1f5f9; color: #475569;">Cancel</button>
                    <button id="okBtn" class="btn btn-primary" style="flex: 1; justify-content: center;">Send Message</button>
                </div>
            `;
            
            // Keyframe animations
            const styleSheet = document.createElement("style");
            styleSheet.innerText = `
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
            `;
            document.head.appendChild(styleSheet);
            
            modal.appendChild(content);
            document.body.appendChild(modal);
            
            const close = () => {
                content.style.transform = "scale(0.9)";
                modal.style.opacity = "0";
                setTimeout(() => modal.remove(), 200);
            };

            document.getElementById('cancelBtn').onclick = close;
            document.getElementById('okBtn').onclick = () => {
                close();
                callback();
            };
        }

        /**
         * Broadcast Logic
         */
        async function sendBroadcast() {
            const btn = document.getElementById('broadcastBtn');
            const msgInput = document.getElementById('broadcastMsg');
            const message = msgInput.value.trim();

            if (!message) return showToast("Pehle message likho bhai!", "error");
            
            showConfirm("Send this message to all users? This may take a few moments.", async () => {
                btn.disabled = true;
                showToast("Initializing global broadcast...", "info");

                try {
                    const res = await fetch('/api/broadcast', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message })
                    });
                    const data = await res.json();
                    if (data.success) {
                        showToast("Broadcast queue started! Safe delays active.", "success");
                        msgInput.value = "";
                    } else {
                        showToast(data.error || "Broadcast error.", "error");
                    }
                } catch (e) {
                    showToast("Request failed. Check server connection.", "error");
                } finally {
                    setTimeout(() => btn.disabled = false, 5000);
                }
            });
        }

        // Init
        fetchLogs();
    </script>
</body>
</html>
